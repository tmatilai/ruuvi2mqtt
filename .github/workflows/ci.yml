name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: rustfmt

      - name: Run fmt
        run: cargo fmt --all -- --check

      - name: Run fmt (esp32)
        run: cargo fmt --manifest-path ruuvi2mqtt-esp32/Cargo.toml -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: clippy

      - name: Setup | Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run clippy
        run: cargo clippy --locked --tests --all-targets --all-features -- -D clippy::all -W clippy::pedantic

  clippy-esp32:
    name: Clippy (ESP32-C6)
    runs-on: ubuntu-latest
    env:
      WIFI_SSID: dummy
      WIFI_PASS: dummy
      MQTT_SERVER: dummy
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly
          components: clippy, rust-src

      - name: Setup | ldproxy
        run: cargo install ldproxy

      - name: Setup | ESP-IDF version
        id: esp-idf
        run: echo "version=$(grep -oP 'ESP_IDF_VERSION\s*=\s*"\K[^"]+' ruuvi2mqtt-esp32/.cargo/config.toml)" >> "$GITHUB_OUTPUT"

      - name: Setup | Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ruuvi2mqtt-esp32 -> target
          cache-directories: ~/.espressif
          shared-key: esp32c6-riscv-${{ steps.esp-idf.outputs.version }}

      - name: Run clippy (ESP32-C6)
        run: cd ruuvi2mqtt-esp32 && cargo clippy --locked -- -D clippy::all -W clippy::pedantic

  test-esp32:
    name: Test (ESP32)
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Run tests
        run: make -C ruuvi2mqtt-esp32 test

  build-esp32:
    name: Build (ESP32-C6)
    runs-on: ubuntu-latest
    env:
      WIFI_SSID: dummy
      WIFI_PASS: dummy
      MQTT_SERVER: dummy
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly
          components: rust-src

      - name: Setup | ldproxy
        run: cargo install ldproxy

      - name: Setup | ESP-IDF version
        id: esp-idf
        run: echo "version=$(grep -oP 'ESP_IDF_VERSION\s*=\s*"\K[^"]+' ruuvi2mqtt-esp32/.cargo/config.toml)" >> "$GITHUB_OUTPUT"

      - name: Setup | Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ruuvi2mqtt-esp32 -> target
          cache-directories: ~/.espressif
          shared-key: esp32c6-riscv-${{ steps.esp-idf.outputs.version }}

      - name: Build firmware
        run: cd ruuvi2mqtt-esp32 && cargo build --release --locked

  test:
    name: Test
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
        os: [ubuntu-latest]
    env:
      USE_CROSS: "${{ !startsWith(matrix.target, 'x86_64-unknown-linux-') }}"
      MUSL: ${{ contains(matrix.target, '-unknown-linux-musl') }}
      CARGO: cargo
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Setup | Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ matrix.target }}-${{ matrix.os }}-debug-build

      - name: Setup | Cross
        if: env.USE_CROSS == 'true'
        run: |
          cargo install --bins cross
          echo "CARGO=cross" >> $GITHUB_ENV

      - name: Setup | Install build dependencies
        if: env.USE_CROSS == 'false'
        run: |
          rustup target add ${{ matrix.target }}
          if [[ "$MUSL" == 'true' ]]; then
            sudo apt-get update
            sudo apt-get install --assume-yes musl-tools
          fi

      - name: Setup | Log in to the Container registry
        if: env.USE_CROSS == 'true'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run check
        run: ${{ env.CARGO }} check --target ${{ matrix.target }}

      - name: Run tests
        run: ${{ env.CARGO }} test --verbose --target ${{ matrix.target }} --bin ruuvi2mqtt

      - name: Run CLI tests
        # trycmd doesn't support cross runners yet:
        # https://github.com/assert-rs/snapbox/issues/51
        if: env.USE_CROSS == 'false'
        run: ${{ env.CARGO }} test --verbose --target ${{ matrix.target }} --test cli_tests
