version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: /
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directories:
      - /
      - /ruuvi2mqtt-esp32
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: "weekly"
